{{/*
secret.yaml — Opaque Secret for sensitive values.
For TLS certs, mount via extraVolumes pointing to a tls Secret instead.
*/}}
{{- if .Values.app.secretEnv -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "astra.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "astra.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $k, $v := .Values.app.secretEnv }}
  {{ $k }}: {{ $v | b64enc | quote }}
  {{- end }}
{{- end }}
