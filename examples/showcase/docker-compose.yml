services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: showcase
      POSTGRES_PASSWORD: showcase
      POSTGRES_DB: showcase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showcase"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ── Application services ──────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: examples/showcase/Dockerfile
      target: api
    environment:
      DATABASE_URL: postgres://showcase:showcase@postgres:5432/showcase?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: change-me-in-production
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  grpc:
    build:
      context: ../..
      dockerfile: examples/showcase/Dockerfile
      target: grpc
    environment:
      DATABASE_URL: postgres://showcase:showcase@postgres:5432/showcase?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: change-me-in-production
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      HTTP_ADDR: ":8081"
      GRPC_ADDR: ":9091"
    ports:
      - "8081:8081"
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: examples/showcase/Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgres://showcase:showcase@postgres:5432/showcase?sslmode=disable
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
