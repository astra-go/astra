apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: showcase-api
  namespace: showcase
  labels:
    app: showcase
    component: api
spec:
  selector:
    matchLabels:
      app: showcase
      component: api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: showcase-grpc
  namespace: showcase
  labels:
    app: showcase
    component: grpc
spec:
  selector:
    matchLabels:
      app: showcase
      component: grpc
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
apiVersion: v1
kind: Service
metadata:
  name: showcase-metrics
  namespace: showcase
  labels:
    app: showcase
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
  selector:
    app: showcase
