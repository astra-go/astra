apiVersion: v1
kind: Namespace
metadata:
  name: showcase
  labels:
    app: showcase
    environment: production
---
apiVersion: v1
kind: Secret
metadata:
  name: showcase-secrets
  namespace: showcase
type: Opaque
stringData:
  database-url: "postgres://showcase:CHANGEME@postgres-service:5432/showcase?sslmode=disable"
  jwt-secret: "CHANGEME-generate-with-openssl-rand-base64-32"
  google-client-id: "CHANGEME"
  google-client-secret: "CHANGEME"
  github-client-id: "CHANGEME"
  github-client-secret: "CHANGEME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: showcase-config
  namespace: showcase
data:
  REDIS_ADDR: "redis-service:6379"
  OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger-collector:4317"
  HTTP_ADDR: ":8080"
  GRPC_ADDR: ":9091"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
