apiVersion: apps/v1
kind: Deployment
metadata:
  name: showcase-worker
  namespace: showcase
  labels:
    app: showcase
    component: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: showcase
      component: worker
  template:
    metadata:
      labels:
        app: showcase
        component: worker
        version: v1
    spec:
      containers:
      - name: worker
        image: astra/showcase-worker:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: showcase-secrets
              key: database-url
        envFrom:
        - configMapRef:
            name: showcase-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Workers typically don't have health endpoints
        # but can implement a simple HTTP server for liveness
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "ps aux | grep worker | grep -v grep"
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: showcase-worker-hpa
  namespace: showcase
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: showcase-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
