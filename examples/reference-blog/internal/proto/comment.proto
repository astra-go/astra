syntax = "proto3";

package comment;

option go_package = "github.com/astra-go/astra/examples/reference-blog/internal/proto";

service CommentService {
  rpc CreateComment(CreateCommentRequest) returns (CommentResponse);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
  rpc DeleteComment(DeleteCommentRequest) returns (Empty);
  rpc LikeComment(LikeCommentRequest) returns (CommentResponse);
}

message CreateCommentRequest {
  uint32 article_id = 1;
  uint32 user_id = 2;
  optional uint32 parent_id = 3;
  string content = 4;
}

message ListCommentsRequest {
  uint32 article_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message DeleteCommentRequest {
  uint32 id = 1;
  uint32 user_id = 2; // For authorization
}

message LikeCommentRequest {
  uint32 id = 1;
}

message CommentResponse {
  uint32 id = 1;
  uint32 article_id = 2;
  uint32 user_id = 3;
  optional uint32 parent_id = 4;
  string content = 5;
  int64 like_count = 6;
  string created_at = 7;
  string updated_at = 8;
}

message ListCommentsResponse {
  repeated CommentResponse comments = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message Empty {}
