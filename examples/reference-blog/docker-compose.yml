version: '3.8'

services:
  # PostgreSQL - 主数据库
  postgres:
    image: postgres:latest
    container_name: blog-postgres
    environment:
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpass
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloguser -d blog"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  # Redis - 缓存
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - blog-network

  # Kafka - 消息队列
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: blog-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - blog-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: blog-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - blog-network

  # Elasticsearch - 搜索引擎
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: blog-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - blog-network

  # Jaeger - 分布式追踪
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: blog-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # jaeger.thrift
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - blog-network

  # Prometheus - 监控指标
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: blog-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - blog-network

  # Grafana - 可视化
  grafana:
    image: grafana/grafana:10.3.3
    container_name: blog-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - blog-network

  # API Server
  api-server:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      target: api-server
    container_name: blog-api-server
    ports:
      - "8080:8080"
      - "9091:9091"  # Prometheus metrics
    environment:
      DATABASE_DSN: "postgres://bloguser:blogpass@postgres:5432/blog?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:29092"
      GRPC_COMMENT_SERVICE_ADDR: "comment-service:9090"
      ELASTICSEARCH_ADDRESSES: "http://elasticsearch:9200"
      JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
      SERVER_MODE: "release"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - blog-network
    restart: unless-stopped

  # Comment Service (gRPC)
  comment-service:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      target: comment-service
    container_name: blog-comment-service
    ports:
      - "9090:9090"
      - "9092:9092"  # Prometheus metrics
    environment:
      DATABASE_DSN: "postgres://bloguser:blogpass@postgres:5432/blog?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
      SERVER_MODE: "release"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blog-network
    restart: unless-stopped

  # Worker (Kafka Consumer)
  worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
      target: worker
    container_name: blog-worker
    environment:
      DATABASE_DSN: "postgres://bloguser:blogpass@postgres:5432/blog?sslmode=disable"
      KAFKA_BROKERS: "kafka:29092"
      ELASTICSEARCH_ADDRESSES: "http://elasticsearch:9200"
      JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - blog-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  es_data:
  prometheus_data:
  grafana_data:

networks:
  blog-network:
    driver: bridge
