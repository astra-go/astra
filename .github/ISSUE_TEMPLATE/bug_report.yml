name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Call function '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your runtime environment.
      placeholder: |
        - OS: macOS 14 / Ubuntu 22.04
        - Go version: 1.22
        - Astra version: v1.0.5-beta.1
        - Related modules (e.g., middleware, config, mq)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Output
      description: Paste any relevant log output or stack traces.
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have included a minimal reproduction case
